<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フォーセール (For Sale)</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <h1>🏢 FOR SALE (フォーセール)</h1>
    
    <div id="my-peer-id">
        <span id="current-display-id">部屋IDを生成中...</span>
    </div>

    <div id="setup-container" class="panel-light">
        <h2>ルームセットアップ</h2>
        
        <div class="input-group">
            <label for="name-input">あなたの名前:</label>
            <input type="text" id="name-input" value="プレイヤー">
        </div>
        
        <hr style="border: none; border-top: 1px solid #e1d7c1; margin: 20px 0;">
        
        <button id="be-host-btn" class="btn-primary" style="margin-bottom: 15px;">🏠 新しい部屋を作る (ホスト)</button>
        
        <div class="input-group" style="margin-top: 15px;">
            <label for="room-id-input">入室する部屋ID (8桁の数字):</label>
            <input type="text" id="room-id-input" placeholder="例: 12345678" maxlength="8">
        </div>
        <button id="join-room-btn" class="btn-secondary">🌐 友達の部屋に入る (ゲスト)</button>
    </div>

    <div id="lobby-container" class="panel-light" style="display: none;">
        <div class="lobby-header-container">
            <h2>📋 待機ロビー</h2>
            <button id="lobby-leave-btn" class="btn-danger">部屋を離脱</button>
        </div>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <div id="lobby-room-id-display" style="font-size: 0.9rem; font-weight: bold; color: #ffffff; background: #1abc9c; padding: 8px 24px; border-radius: 20px; display: inline-block; box-shadow: 0 3px 6px rgba(26,188,156,0.2);">
                現在の部屋ID: <span id="lobby-current-room-id">---- ----</span>
            </div>
        </div>

        <div id="integrated-custom-settings" style="margin-bottom: 20px;">
            <div class="input-group" style="margin-top: 10px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="setting-show-owned-cards" checked>
                    <span>ゲーム中に「自分が獲得した物件カード一覧」を表示する</span>
                </label>
            </div>
        </div>

        <h3>👥 参加プレイヤーリスト</h3>
        <div id="lobby-player-list"></div>
        <button id="start-game-btn" class="btn-primary" style="display: none; margin-top: 20px; font-size: 1.2rem; padding: 15px;">🎮 ゲーム開始</button>
    </div>

    <div id="game-container" style="display: none;">
        <div class="game-board">
        
            <div class="game-top-bar">
                <button id="leave-room-btn" class="btn-danger game-top-leave-btn">🚪 離脱</button>
                <div class="game-top-center">
                    <div id="role-display" class="game-status-text">あなたのアクションを選んでください</div>
                    <div class="game-top-actions">
                        <button id="submit-bid-btn" class="btn-secondary">入札</button>
                        <button id="submit-pass-btn" class="btn-danger">パス</button>
                    </div>
                </div>
                <button id="next-round-btn" class="btn-primary game-top-next-btn" style="display: none;">⏭️ 次ラウンド</button>
            </div>

            <div class="game-main-area">
            
                <div class="market-and-deck">
                    <div class="auction-board-wrapper">
                        <div class="market-container">
                            <h3 id="market-title-text" class="market-title">競売にかけられた物件</h3>
                            <div id="card-tracker-list" class="market-cards"></div>
                        </div>
                        
                        <div id="deck-pile-container"></div>
                    </div>
                </div>

                <div id="bid-status-board"></div>

                <div class="player-console-area">
                    <div id="console-info-text" class="console-info-text">
                        あなたの現在の入札値: 0 k$ | あなたの手持ちコイン: 14 k$ | 入札の最低値: 1 k$
                    </div>
                    
                    <div id="owned-cards-panel" style="background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(2px); border-radius: 8px; padding: 10px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.4);">
                        <div style="font-size: 0.85rem; font-weight: bold; color: #555; margin-bottom: 5px;">🏡 獲得済みの物件カード</div>
                        <div id="owned-cards-list" style="display: flex; flex-wrap: wrap; gap: 5px; min-height: 40px;">
                        </div>
                    </div>

                    <div id="card-area"></div>
                </div>

            </div>

            <div id="game-side-players" class="game-side-players"></div>

            <div style="grid-column: 1 / span 2; width: 100%;">
                <div id="log-box"></div>
            </div>
        
            <div class="host-abort-wrapper">
                <button id="host-abort-btn" class="btn-danger" style="display: none;">
                    🛑 ゲームを強制終了してロビーに戻る
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
