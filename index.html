<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 🏢 FOUR SALE </title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        #my-peer-id {
            cursor: pointer;
            transition: opacity 0.2s;
            display: inline-block;
            margin-bottom: 15px;
        }
        #my-peer-id:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <h1> 🏢 FOUR SALE </h1>
    <div id="my-peer-id">部屋IDを取得中...</div>

    <div id="setup-container">
        <h2>ルームセットアップ</h2>
        <div class="input-group">
            <label for="name-input">あなたのプレイヤー名:</label>
            <input type="text" id="name-input" value="プレイヤー" maxlength="10">
        </div>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #4f5d73;">
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button id="be-host-btn">🏠 部屋を作る (ホスト)</button>
        </div>
        <div class="input-group">
            <label for="room-id-input">友達の部屋ID (数字8桁):</label>
            <input type="text" id="room-id-input" placeholder="12345678" maxlength="8">
        </div>
        <button id="join-room-btn" class="btn-secondary">🌐 部屋に入る (ゲスト)</button>
        
        <div style="margin-top: 20px; background: rgba(0,0,0,0.03); padding: 15px; border-radius: 8px;">
            <h3>👥 待機メンバー</h3>
            <div id="player-list-lobby"></div>
            <button id="start-game-btn" style="display: none; background: #e67e22; margin-top: 15px;">🎮 ゲームを開始する</button>
        </div>
    </div>

    <div id="game-container" class="game-layout" style="display: none;">
        <div class="main-column">
            <div id="role-display" class="panel-light" style="font-weight: bold; color: #ba7a5f; margin-bottom: 5px; text-align: center;">
                待機中...
            </div>

            <div class="top-action-bar panel-light">
                <div class="tutorial-icon">🎓</div>
                <div class="action-prompt"><span class="highlight-red">あなた</span> は行動を選んでください</div>
                <div class="action-buttons">
                    <button id="action-bid-btn" class="btn-bid">入札</button>
                    <button id="action-pass-btn" class="btn-pass">パス</button>
                </div>
            </div>

            <div class="auction-board">
                <div class="auction-cards-wrapper">
                    <div id="card-tracker-list"></div>
                    <div id="card-area" class="card-area"></div>
                </div>
                <div class="deck-wrapper">
                    <div class="deck-card">
                        <div class="deck-title">FOR SALE</div>
                        <div id="deck-count" class="deck-badge">×25</div>
                    </div>
                </div>
            </div>

            <div id="bid-status-grid" class="bid-status-grid"></div>

            <div class="bottom-coin-bar panel-light">
                <h3 id="hand-title" style="font-size: 1rem; margin-bottom: 5px;">あなたの資産</h3>
                <div class="coin-stats" id="coin-stats-text"></div>
                <div id="coin-buttons-area" class="coin-buttons"></div>
            </div>
        </div>

        <div class="sidebar-column">
            <div class="player-list-container panel-light">
                <h3>👥 プレイヤー状況</h3>
                <div id="player-list"></div>
            </div>
            <button id="leave-room-btn" class="btn-sidebar">🚪 部屋を離脱</button>
            <button id="next-round-btn" style="display: none; background: #3498db; width: 100%; margin-top: 5px;">🔄 次のラウンドへ</button>
            <div id="log-box" class="panel-light" style="margin-top: 15px;"></div>
        </div>
    </div>

    <div id="target-modal" class="modal">
        <div class="modal-content">
            <div id="target-buttons"></div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
