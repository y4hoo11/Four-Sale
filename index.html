<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>フォーセール (For Sale) P2P</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        /* ==========================================================================
           🏠 ルームセットアップ & 📋 待機ロビー 共通のUI（以前のデザインを維持）
           ========================================================================== */
        .panel-container {
            background-color: #34495e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"] {
            width: 100%; padding: 10px; border: none; border-radius: 4px; box-sizing: border-box; font-size: 1rem;
        }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 5px;
        }
        .btn-primary { background-color: #2ecc71; color: white; }
        .btn-primary:hover { background-color: #27ae60; }
        .btn-secondary { background-color: #3498db; color: white; }
        .btn-secondary:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; color: white; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-host-transfer { background-color: #f1c40f; color: #2c3e50; }
        .btn-host-transfer:hover { background-color: #d4ac0d; }

        .lobby-header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; margin-bottom: 15px; }
        .lobby-header-container h2 { margin: 0; font-size: 1.5rem; color: #f1c40f; }
        #lobby-leave-btn { width: auto; margin-top: 0; padding: 6px 12px; font-size: 0.85rem; }
        
        /* ロビー用の簡易プレイヤーリストアイテム */
        .lobby-player-item {
            background-color: #2c3e50; padding: 10px 15px; border-radius: 6px; margin-bottom: 10px; border-left: 5px solid #7f8c8d;
            display: flex; justify-content: space-between; align-items: center;
        }
        .host-action-group { display: flex; gap: 5px; }
        .host-action-group button { width: auto; padding: 4px 8px; font-size: 0.75rem; margin-top: 0; }

        /* ==========================================================================
           🎮 完全に分離されたゲーム中（BGA風木目調）のUI
           ========================================================================== */
        .game-board {
            display: grid;
            grid-template-columns: 1fr 280px; /* メインボードと右側プレイヤーリスト */
            gap: 15px;
            width: 100%;
            max-width: 1100px;
            background: #e4c49a; /* 木目調ベースカラー */
            background-image: radial-gradient(rgba(255,255,255,0.15) 1px, transparent 0), radial-gradient(rgba(0,0,0,0.1) 1px, transparent 0);
            background-size: 8px 8px;
            padding: 15px;
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2), 0 10px 25px rgba(0,0,0,0.4);
            box-sizing: border-box;
            color: #2c3e50; /* ゲーム中は視認性のため文字を暗く */
        }

        /* 上部共通通知バー */
        .game-top-bar {
            grid-column: 1 / span 2;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #bdc3c7;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .game-status-text { color: #e74c3c; font-size: 1.1rem; }
        .game-top-bar button { width: auto; margin: 0 5px; padding: 6px 15px; font-size: 0.9rem; }

        /* 左側：メインプレイエリア */
        .game-main-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 競り物件・山札エリア */
        .market-and-deck {
            display: flex;
            background: rgba(255,255,255,0.4);
            border-radius: 6px;
            padding: 15px;
            min-height: 160px;
            border: 1px dashed rgba(0,0,0,0.15);
            gap: 20px;
        }
        .market-container { flex: 1; }
        .market-title { font-size: 0.9rem; font-weight: bold; margin: 0 0 10px 0; color: #34495e; }
        .market-cards { display: flex; gap: 10px; flex-wrap: wrap; }
        
        /* 山札の見た目 */
        .deck-pile {
            width: 90px;
            height: 130px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            border: 3px solid #fff;
            border-radius: 8px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-weight: bold;
        }

        /* 各プレイヤーの現在の入札ステータス（中央エリア） */
        .bid-status-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .bid-box {
            background: rgba(255,255,255,0.5);
            padding: 12px;
            border-radius: 4px;
            border: 1px solid rgba(0,0,0,0.1);
            font-size: 0.95rem;
        }
        .bid-box.current-player {
            background: rgba(241, 196, 15, 0.2);
            border-color: #f1c40f;
        }

        /* 下部：操作・手札エリア */
        .player-console-area {
            background: rgba(255, 255, 255, 0.7);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .console-info-text {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #34495e;
        }

        /* 🪙 コインボタンの並び */
        .coin-selector-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .coin-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #bdc3c7, #95a5a6);
            border: 2px solid #fff;
            box-shadow: 1px 2px 4px rgba(0,0,0,0.2);
            color: #2c3e50;
            font-weight: bold;
            font-size: 0.75rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }
        .coin-button:hover { transform: scale(1.08); background: linear-gradient(135deg, #d5dbdb, #bdc3c7); }
        .coin-button.selected { border-color: #e74c3c; box-shadow: 0 0 8px #e74c3c; transform: translateY(-3px); }

        /* 🏢 物件カードの見た目（競り場・手札共通） */
        .game-card {
            width: 85px;
            height: 125px;
            background: #fff;
            border: 2px solid #34495e;
            border-radius: 6px;
            box-shadow: 1px 3px 6px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8px;
            box-sizing: border-box;
            position: relative;
        }
        .game-card .card-top-num { font-size: 1.2rem; font-weight: bold; color: #2c3e50; }
        .game-card .card-bottom-num { font-size: 1.2rem; font-weight: bold; color: #2c3e50; text-align: right; }
        .game-card .card-illustration {
            flex: 1; display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; opacity: 0.8; margin: 2px 0;
        }
        
        /* 右側：縦並びプレイヤーパネル */
        .game-side-players {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .side-player-card {
            background: #f8f9fa;
            border-radius: 4px;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            border-left: 6px solid #bdc3c7;
        }
        .side-player-card.active-turn { border-left-color: #2ecc71; background: #ebf5fb; }
        .side-player-card.disconnected { opacity: 0.5; border-left-color: #e74c3c; }
        .side-player-name { font-weight: bold; font-size: 0.95rem; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .side-player-stats { font-size: 0.8rem; color: #626567; display: flex; gap: 10px; }

        /* 📜 ログ */
        #game-log {
            background: #2c3e50; color: #ecf0f1; padding: 10px; border-radius: 4px; height: 100px;
            overflow-y: auto; font-family: monospace; font-size: 0.85rem; margin-top: 10px; width: 100%; box-sizing: border-box;
        }
        .score-badge { background-color: #f1c40f; color: #2c3e50; padding: 1px 5px; border-radius: 10px; font-size: 0.75rem; }
    </style>
</head>
<body>

    <h1>🏢 FOR SALE (フォーセール)</h1>
    <div id="my-peer-id" style="margin-bottom: 20px; font-weight: bold; background: #16a085; padding: 5px 15px; border-radius: 20px; cursor: pointer;">部屋IDを生成中...</div>

    <div id="setup-container" class="panel-container">
        <h2>ルームセットアップ</h2>
        <div class="input-group">
            <label for="name-input">あなたの名前:</label>
            <input type="text" id="name-input" value="プレイヤー">
        </div>
        <button id="be-host-btn" class="btn-primary" style="margin-bottom: 15px;">🏠 新しい部屋を作る (ホスト)</button>
        <hr style="border-color: #2c3e50; margin: 20px 0;">
        <div class="input-group">
            <label for="room-id-input">入室する部屋ID (8桁の数字):</label>
            <input type="text" id="room-id-input" placeholder="例: 12345678" maxlength="8">
        </div>
        <button id="join-room-btn" class="btn-secondary">🌐 友達の部屋に入る (ゲスト)</button>
    </div>

    <div id="lobby-container" class="panel-container" style="display: none;">
        <div class="lobby-header-container">
            <h2>📋 待機ロビー</h2>
            <button id="lobby-leave-btn" class="btn-danger">部屋を離脱</button>
        </div>
        <div id="integrated-custom-settings" style="margin-bottom: 20px;"></div>
        <h3>👥 参加プレイヤーリスト</h3>
        <div id="lobby-player-list"></div>
        <button id="start-game-btn" class="btn-primary" style="display: none; margin-top: 20px; font-size: 1.2rem; padding: 15px;">🎮 ゲーム開始</button>
    </div>

    <div id="game-container" style="display: none; width: 100%; max-width: 1100px;">
        <div class="game-board">
            
            <div class="game-top-bar">
                <div id="role-display" class="game-status-text">あなたのアクションを選んでください</div>
                <div style="display: flex; gap: 5px;">
                    <button id="submit-bid-btn" class="btn-secondary" style="background:#3498db;">入札</button>
                    <button id="submit-pass-btn" class="btn-danger">パス</button>
                    <button id="next-round-btn" class="btn-primary" style="display: none;">⏭️ 次ラウンド</button>
                    <button id="leave-room-btn" class="btn-danger" style="padding: 6px 12px; font-size:0.85rem;">🚪 離脱</button>
                </div>
            </div>

            <div class="game-main-area">
                
                <div class="market-and-deck">
                    <div class="market-container">
                        <div id="market-title-text" class="market-title">競売にかけられた物件</div>
                        <div id="card-tracker-list" class="market-cards">
                            </div>
                    </div>
                    <div id="deck-pile-visual" class="deck-pile">
                        <span style="font-size:0.8rem;">FOR SALE</span>
                        <div id="deck-count-num" style="font-size: 1.8rem; margin: 5px 0;">25</div>
                        <span style="font-size:0.7rem;">残り枚数</span>
                    </div>
                </div>

                <div id="bid-status-board" class="bid-status-board">
                    </div>

                <div class="player-console-area">
                    <div id="console-info-text" class="console-info-text">
                        あなたの現在の入札値: 0 k$ | あなたの手持ちコイン: 14 k$ | 入札の最低値: 1 k$
                    </div>
                    <div id="card-area">
                        </div>
                </div>

            </div>

            <div id="game-side-players" class="game-side-players">
                </div>

            <div style="grid-column: 1 / span 2; width: 100%;">
                <div id="game-log"></div>
            </div>

        </div>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
